<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetica - The Image Gallery</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Aesthetica - The Image Gallery</h1>

<div class="controls">
  <label class="file-upload">
  <input type="file" id="fileInput">
  <span>📁 Choose Image</span>
  </label>
  <select id="category">
    <option value="all">All</option>
    <option value="nature">Nature</option>
    <option value="animals">Animals</option>
    <option value="architecture">Architecture</option>
    <option value="cities">Cities</option>
  </select>
  <button onclick="addImage()">Upload</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterImages(event,'all')">All</button>
  <button class="filter-btn" onclick="filterImages(event,'nature')">Nature</button>
  <button class="filter-btn" onclick="filterImages(event,'animals')">Animals</button>
  <button class="filter-btn" onclick="filterImages(event,'architecture')">Architecture</button>
  <button class="filter-btn" onclick="filterImages(event,'cities')">Cities</button>
</div>

<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="nav-btn prev" onclick="prevImage(event)">❮</button>
  <img id="lightboxImg">
  <button class="nav-btn next" onclick="nextImage(event)">❯</button>
</div>

<script src="script.js"></script>
</body>
</html>
